<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>C++ DFS Monitor</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; padding: 20px; }
        .card { background: #2d2d2d; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #4fc3f7; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-item { background: #333; padding: 15px; border-radius: 5px; text-align: center; }
        .stat-val { font-size: 24px; font-weight: bold; color: #69f0ae; }
        #chart-container { width: 100%; height: 400px; }
    </style>
</head>
<body>
    <h1>🚀 C++ High-Performance DFS Status</h1>
    
    <div class="stat-grid">
        <div class="stat-item">
            <div>Memory Usage</div>
            <div id="mem-val" class="stat-val">0 MB</div>
        </div>
        <div class="stat-item">
            <div>Total Requests</div>
            <div id="req-val" class="stat-val">0</div>
        </div>
        <div class="stat-item">
            <div>Real-time QPS</div>
            <div id="qps-val" class="stat-val">0</div>
        </div>
    </div>

    <div class="card">
        <h2>Traffic Monitor</h2>
        <div id="chart-container"></div>
    </div>

    <script>
        var myChart = echarts.init(document.getElementById('chart-container'));
        var dataQPS = [];
        var dataMem = [];
        var now = new Date();
        var lastTotalRequests = 0;

        // 初始化图表配置
        var option = {
            backgroundColor: '#2d2d2d',
            tooltip: { trigger: 'axis' },
            legend: { data: ['QPS', 'Memory (MB)'], textStyle: { color: '#eee' } },
            xAxis: { type: 'time', splitLine: { show: false }, axisLabel: { color: '#eee' } },
            yAxis: [
                { type: 'value', name: 'QPS', axisLabel: { color: '#69f0ae' }, splitLine: { lineStyle: { color: '#444' } } },
                { type: 'value', name: 'Memory (MB)', axisLabel: { color: '#4fc3f7' }, splitLine: { show: false } }
            ],
            series: [
                { name: 'QPS', type: 'line', showSymbol: false, hoverAnimation: false, itemStyle: { color: '#69f0ae' }, lineStyle: { width: 3 } },
                { name: 'Memory (MB)', type: 'line', yAxisIndex: 1, showSymbol: false, itemStyle: { color: '#4fc3f7' }, lineStyle: { width: 3, type: 'dashed' } }
            ]
        };
        myChart.setOption(option);

        // 定时拉取数据
        setInterval(async function() {
            try {
                // 调用你的 C++ 接口
                const res = await fetch('http://192.168.88.131:8080/status');
                const json = await res.json();
                const data = json.data;

                // 计算 QPS
                let qps = 0;
                if (lastTotalRequests !== 0) {
                    qps = data.total_requests - lastTotalRequests;
                }
                lastTotalRequests = data.total_requests;

                // 更新数值面板
                document.getElementById('mem-val').innerText = data.memory_mb.toFixed(1) + " MB";
                document.getElementById('req-val').innerText = data.total_requests.toLocaleString();
                document.getElementById('qps-val').innerText = qps.toLocaleString();

                // 更新图表数据
                var timeStr = new Date().toISOString();
                dataQPS.push({ name: timeStr, value: [timeStr, qps] });
                dataMem.push({ name: timeStr, value: [timeStr, data.memory_mb] });

                // 保持最近 60 秒数据
                if (dataQPS.length > 60) { dataQPS.shift(); dataMem.shift(); }

                myChart.setOption({ series: [{ data: dataQPS }, { data: dataMem }] });

            } catch(e) { console.error(e); }
        }, 1000);
    </script>
</body>
</html>
